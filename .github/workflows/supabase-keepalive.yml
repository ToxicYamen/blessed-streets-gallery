name: Supabase Keep-Alive

# Supabase pausiert Projekte im Free-Plan nach 7 Tagen ohne API-Zugriff.
# Dieser Workflow pingt die REST- und Auth-API täglich, damit das Projekt
# wach bleibt — läuft auf GitHubs Servern, also auch wenn der eigene PC aus ist.
#
# Der Key hier ist der *publishable* (anon) Key. Der wird ohnehin an jeden
# Browser ausgeliefert und ist per RLS abgesichert — er darf im Klartext stehen.
#
# Zusätzlich schreibt der Job wöchentlich einen Heartbeat-Commit. Grund:
# GitHub deaktiviert geplante Workflows automatisch nach 60 Tagen ohne
# Repository-Aktivität, und Workflow-Runs allein zählen nicht als Aktivität.

on:
  schedule:
    # Täglich um 04:17 UTC. Krumme Zeit mit Absicht — zur vollen Stunde sind
    # GitHubs Runner-Queues am vollsten und der Job wird oft verzögert.
    - cron: "17 4 * * *"
  workflow_dispatch: # erlaubt manuelles Auslösen über den Actions-Tab

permissions:
  contents: write # für den Heartbeat-Commit

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

env:
  SUPABASE_URL: https://xsyjrijezdajiojxgzzr.supabase.co
  SUPABASE_ANON_KEY: sb_publishable_0hOP3uwiK2A5ENf_5s69fA_XY37wfzN

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase REST API
        run: |
          set -euo pipefail

          echo "→ REST /products"
          rest_status=$(curl -sS -o /tmp/rest.json -w "%{http_code}" \
            --retry 3 --retry-delay 10 --retry-all-errors --max-time 30 \
            "$SUPABASE_URL/rest/v1/products?select=slug&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY")

          echo "   HTTP $rest_status"
          if [ "$rest_status" != "200" ]; then
            echo "::error::REST-Ping fehlgeschlagen (HTTP $rest_status)"
            cat /tmp/rest.json
            exit 1
          fi

          echo "→ Auth /health"
          auth_status=$(curl -sS -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 10 --retry-all-errors --max-time 30 \
            "$SUPABASE_URL/auth/v1/health" \
            -H "apikey: $SUPABASE_ANON_KEY")

          echo "   HTTP $auth_status"
          if [ "$auth_status" != "200" ]; then
            echo "::error::Auth-Ping fehlgeschlagen (HTTP $auth_status)"
            exit 1
          fi

          echo "✓ Supabase ist wach"

      # Nur sonntags committen — hält das Repo innerhalb des 60-Tage-Fensters
      # aktiv, ohne die History mit 365 Commits pro Jahr zu fluten.
      - name: Heartbeat-Commit (wöchentlich)
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail

          if [ "$(date -u +%u)" != "7" ]; then
            echo "Heute ist kein Sonntag — kein Commit nötig."
            exit 0
          fi

          mkdir -p .github
          date -u +"Letzter Supabase-Keep-Alive: %Y-%m-%d %H:%M UTC" > .github/KEEPALIVE

          if git diff --quiet -- .github/KEEPALIVE; then
            echo "Keine Änderung."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/KEEPALIVE
          git commit -m "chore: supabase keep-alive heartbeat [skip ci]"
          git push
